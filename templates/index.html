<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <form action="/add" method="POST">
        <input name="task" placeholder="New task" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>
            {% if task[3] %}
                <strike>{{ task[2] }}</strike>
            {% else %}
                {{ task[2] }}
            {% endif %}

            <a href="/done/{{ task[0] }}">Done</a>
            <a href="/delete/{{ task[0] }}">Delete</a>
            <a href="/edit/{{ task[0] }}">Edit</a>
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
